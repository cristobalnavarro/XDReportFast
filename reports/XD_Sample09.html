<script type="text/javascript">
/* FR_OVERLAY_FIX_JS */
(function() {
    function fixOverlays() {
        var container = document.querySelector('div[style*="position:relative"]');
        if (!container) return;
        var children = container.children;
        for (var i = 0; i < children.length; i++) {
            var el = children[i];
            if (el.tagName === 'DIV' && el.innerHTML === '&nbsp;') {
                var s = el.getAttribute('style') || '';
                if (s.indexOf('width:') > -1 && s.indexOf('height:') > -1) {
                    var w = parseFloat(s.match(/width:([\d.]+)px/)?.[1] || 0);
                    var h = parseFloat(s.match(/height:([\d.]+)px/)?.[1] || 0);
                    if (w > 700 && h > 1000) {
                        el.style.pointerEvents = 'none';
                    }
                }
            }
        }
    }
    if (document.readyState === 'loading')
        document.addEventListener('DOMContentLoaded', fixOverlays);
    else
        fixOverlays();
})();
</script>

<script type="text/javascript">
/* FR_CLICK_INJECTED */
(function() {
    function attachHandlers() {
        var links = document.querySelectorAll('a[href]');
        for (var i = 0; i < links.length; i++) {
            (function(el) {
                var href = el.getAttribute('href');
                if (!href || href.indexOf('#') === 0 || href.indexOf('javascript') === 0) return;
                el.style.cursor = 'pointer';
                el.onclick = function(e) {
                    e.preventDefault();
                    var val = el.getAttribute('href');
                    // Enlaces HTTP/HTTPS: abrir en ventana nueva
                    if (val.indexOf('http') === 0 || val.indexOf('//') === 0) {
                        window.open(val, '_blank');
                        return false;
                    }
                    // Enlaces personalizados (ID_IVA_21, etc.): acción custom
                    var handled = false;
                    try {
                        if (window.parent && window.parent.FR_OnClick) {
                            window.parent.FR_OnClick(val);
                            handled = true;
                        }
                    } catch(err) { /* Cross-origin bloqueado */ }
                    if (!handled) {
                        if (window.FR_OnClick) {
                            window.FR_OnClick(val);
                        } else {
                            alert('FastReport XD\nClic en: ' + val);
                        }
                    }
                    return false;
                };
            })(links[i]);
        }
    }
    if (document.readyState === 'loading')
        document.addEventListener('DOMContentLoaded', attachHandlers);
    else
        attachHandlers();
})();
</script>
